name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Workspace package to publish"
        required: true
        default: "@cubid/core"
        type: choice
        options:
          - "@cubid/core"
          - "@cubid/browser"
          - "@cubid/react"
          - "@cubid/evm"
          - "@cubid/wagmi"
          - "@cubid/web2"
          - "@cubid/web2-react"
          - "@cubid/web3"
      publish_npm:
        description: "Publish the selected package to npm using Trusted Publishing"
        required: true
        default: false
        type: boolean
      publish_jsr:
        description: "Publish the selected package to JSR using trusted publishing"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve package metadata
        id: package
        run: |
          case "${{ inputs.package_name }}" in
            "@cubid/core")
              echo "package_dir=packages/core" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=true" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/browser")
              echo "package_dir=packages/browser" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/react")
              echo "package_dir=packages/react" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/evm")
              echo "package_dir=packages/evm" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/wagmi")
              echo "package_dir=packages/wagmi" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/web2")
              echo "package_dir=packages/web2" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/web2-react")
              echo "package_dir=packages/web2-react" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            "@cubid/web3")
              echo "package_dir=packages/web3" >> "$GITHUB_OUTPUT"
              echo "jsr_supported=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: ${{ inputs.package_name }}"
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release branch
        if: ${{ inputs.publish_npm || inputs.publish_jsr }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Package releases must be dispatched from the main branch. Current ref: $GITHUB_REF"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print publish tool versions
        run: |
          node --version
          npm --version
          pnpm --version
          deno --version

      - name: Validate @cubid/core
        if: ${{ inputs.package_name == '@cubid/core' }}
        run: |
          pnpm --filter @cubid/core test
          pnpm --filter @cubid/core typecheck
          pnpm --filter @cubid/core deno:check
          pnpm --filter @cubid/core build
          pnpm --filter @cubid/core pack:dry-run
          pnpm --filter @cubid/core jsr:dry-run

      - name: Validate workspace packages
        if: ${{ inputs.package_name != '@cubid/core' }}
        run: |
          pnpm test
          pnpm typecheck
          pnpm build
          cd "${{ steps.package.outputs.package_dir }}"
          PACK_DIR="$(mktemp -d)"
          pnpm pack --pack-destination "$PACK_DIR"

      - name: Reject unsupported JSR publish targets
        if: ${{ inputs.publish_jsr && steps.package.outputs.jsr_supported != 'true' }}
        run: |
          echo "JSR publishing is currently supported only for @cubid/core."
          exit 1

      - name: Publish selected package to npm
        if: ${{ inputs.publish_npm }}
        working-directory: ${{ steps.package.outputs.package_dir }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Publish selected package to JSR
        if: ${{ inputs.publish_jsr }}
        working-directory: ${{ steps.package.outputs.package_dir }}
        run: pnpm dlx jsr publish
