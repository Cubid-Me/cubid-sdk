name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish @cubid/core to npm using Trusted Publishing"
        required: true
        default: false
        type: boolean
      publish_jsr:
        description: "Publish @cubid/core to JSR using trusted publishing"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release branch
        if: ${{ inputs.publish_npm || inputs.publish_jsr }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/master" ]; then
            echo "Package releases must be dispatched from the master branch. Current ref: $GITHUB_REF"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print publish tool versions
        run: |
          node --version
          npm --version
          pnpm --version
          deno --version

      - name: Validate @cubid/core
        run: |
          pnpm --filter @cubid/core test
          pnpm --filter @cubid/core typecheck
          pnpm --filter @cubid/core deno:check
          pnpm --filter @cubid/core build
          pnpm --filter @cubid/core pack:dry-run
          pnpm --filter @cubid/core jsr:dry-run

      - name: Publish @cubid/core to npm
        if: ${{ inputs.publish_npm }}
        run: npm publish --workspace @cubid/core --access public --provenance

      - name: Publish @cubid/core to JSR
        if: ${{ inputs.publish_jsr }}
        working-directory: packages/core
        run: pnpm dlx jsr publish
